<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Productos · Papelería Inteligente</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body data-page="products">
<div class="app-shell">

<aside class="sidebar">
  <a class="brand" href="/app/dashboard"><span>PI</span><strong>Papelería Inteligente</strong></a>
  <nav>
    <a href="/app/dashboard">Panel</a>
    <a href="/app/productos">Productos</a>
    <a href="/app/ventas">Ventas</a>
    <a href="/app/inventario">Inventario</a>
    <a href="/app/proveedores">Proveedores</a>
    <a href="/app/compras">Compras</a>
    <a href="/app/reportes">Reportes</a>
    <a href="/app/predicciones">Predicción</a>
  </nav>
  <button id="logoutBtn" class="link-button" type="button">Cerrar sesión</button>
</aside>

<main class="content">
  <div id="flash" class="flash"></div>

<header class="page-header"><div><span class="eyebrow">Catálogo</span><h1>Productos</h1><p>Registra y consulta artículos de la papelería.</p></div></header>
<section class="two-columns wide-left">
  <article class="card"><h2>Nuevo producto</h2>
    <form id="productForm" class="form-grid">
      <input type="hidden" name="id">
      <label>Nombre</label><input name="nombre" required>
      <label>Descripción</label><input name="descripcion">
      <label>Categoría</label><select name="categoriaId" id="productCategory" required></select>
      <label>Precio</label><input name="precio" type="number" min="0" step="0.01" required>
      <label>Stock</label><input name="stock" type="number" min="0" required>
      <label>Stock mínimo</label><input name="stockMinimo" type="number" min="0" required>
      <button class="btn primary" type="submit">Guardar</button>
    </form>
  </article>
  <article class="card"><h2>Listado</h2><div id="productsTable" class="table-wrap"></div></article>
</section>

</main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
