<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Productos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{base :: body}">
    <header class="page-header">
        <div>
            <span class="eyebrow">Catálogo</span>
            <h1>Productos</h1>
            <p>Registra, edita y elimina productos desde la API del backend.</p>
        </div>
    </header>

    <section class="two-columns wide-left">
        <article class="card">
            <div class="section-title">
                <h2>Listado de productos</h2>
                <span id="productCount">0 productos</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody"></tbody>
                </table>
            </div>
        </article>

        <article class="card form-panel">
            <div class="section-title">
                <h2>Nuevo producto</h2>
                <span>Datos básicos</span>
            </div>
            <form id="productForm" class="form-grid">
                <label>Nombre</label>
                <input name="nombre" placeholder="Ej: Cuaderno universitario 100 hojas" required>
                <label>Categoría</label>
                <input name="categoria" placeholder="Ej: Cuadernos, Escritura, Oficina" required>
                <label>Precio</label>
                <input name="precioUnitario" type="number" step="0.01" min="0" required>
                <label>Stock inicial</label>
                <input name="stock" type="number" min="0" required>
                <label>Stock mínimo</label>
                <input name="stockMinimo" type="number" min="0" required>
                <label>Fecha de vencimiento</label>
                <input name="fechaVencimiento" type="date">
                <button class="btn primary full" type="submit">Registrar producto</button>
            </form>
        </article>
    </section>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
